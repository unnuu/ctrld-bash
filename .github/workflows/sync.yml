name: Sync Hagezi to ControlD

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      profile:
        description: 'Specific profile to sync'
        required: false
        default: ''
      dry_run:
        description: 'Dry run'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      - name: Validate config
        run: |
          if [[ ! -f config.toml ]]; then
            echo "ERROR: config.toml not found"
            exit 1
          fi

      - name: Run sync
        env:
          CONTROLD_API_TOKEN: ${{ secrets.CONTROLD_API_TOKEN }}
        run: |
          ARGS=()
          [[ -n "${{ github.event.inputs.profile }}" ]] && ARGS+=("--profile" "${{ github.event.inputs.profile }}")
          [[ "${{ github.event.inputs.dry_run }}" == "true" ]] && ARGS+=("--dry-run")
          ./sync-hagezi.sh "${ARGS[@]}"
